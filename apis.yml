aid: boardroom-governance
name: Boardroom Governance
description: >-
  Boardroom is a governance aggregation platform that helps developers fetch and
  display governance data across DAOs and decentralized networks. The Boardroom
  Governance API provides access to proposals, votes, protocols, and voter data
  for Web3 governance applications.
